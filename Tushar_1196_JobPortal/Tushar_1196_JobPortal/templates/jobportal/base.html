<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Job Portal{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f5f7fb;
        }

        .auth-shell {
            min-height: 100vh;
            padding: 32px 16px;
        }

        .auth-card,
        .dashboard-card {
            width: min(100%, 480px);
            border-radius: 8px;
        }

        .dashboard-card {
            width: min(100%, 680px);
        }
    </style>
</head>
<body>
    {% if request.user.is_authenticated %}
        <nav class="navbar navbar-expand-lg bg-white border-bottom">
            <div class="container">
                <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">Job Portal</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="mainNav">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                        <li class="nav-item"><a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a></li>
                        <li class="nav-item"><a class="nav-link" href="{% url 'profile' %}">Profile</a></li>
                        {% if request.user.profile.user_type == "recruiter" %}
                            <li class="nav-item"><a class="nav-link" href="{% url 'job_post' %}">Post Job</a></li>
                        {% else %}
                            <li class="nav-item"><a class="nav-link" href="{% url 'apply_jobs' %}">Find Jobs</a></li>
                        {% endif %}
                        <li class="nav-item"><a class="nav-link" href="{% url 'matches' %}">Skill Matches</a></li>
                        <li class="nav-item"><a class="nav-link" href="{% url 'logout' %}">Logout</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    {% endif %}

    <main class="{% block main_class %}container py-4{% endblock %}">
        {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
