{% extends "accounts/base.html" %}

{% block title %}Dashboard | Job Portal{% endblock %}

{% block content %}
<section class="card dashboard-card border-0 shadow-sm">
    <div class="card-body p-4">
        <h1 class="h3 mb-2">Welcome, {{ request.user.profile.display_name|default:request.user.username }}</h1>
        <p class="text-secondary mb-4">
            You are logged in as {{ request.user.profile.get_user_type_display|default:"User" }}.
        </p>

        <a class="btn btn-outline-primary" href="{% url 'logout' %}">Logout</a>
    </div>
</section>
{% endblock %}
